<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
</helmet>
<header style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(251,250,247,0.92);backdrop-filter:saturate(120%) blur(8px);border-bottom:1px solid rgba(26,45,71,0.10);font-family:'Source Sans 3',sans-serif;">
  <div style="max-width:1200px;margin:0 auto;padding:0 32px;height:82px;display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="index.html" style="display:flex;flex-direction:column;text-decoration:none;line-height:1;flex-shrink:0;">
      <span style="font-family:'Lora',serif;font-size:23px;font-weight:700;color:#1A2D47;letter-spacing:0.02em;">{{ nameMark }}</span>
      <span style="font-size:10.5px;font-weight:500;letter-spacing:0.32em;text-transform:uppercase;color:#B08D57;margin-top:4px;">{{ roleMark }}</span>
    </a>
    <nav style="display:flex;align-items:center;gap:30px;">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="5">
        <a href="{{ item.href }}" style="{{ item.style }}">{{ item.label }}</a>
      </sc-for>
    </nav>
    <div style="display:flex;align-items:center;gap:20px;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:2px;font-size:12px;font-weight:600;letter-spacing:0.06em;">
        <sc-for list="{{ langs }}" as="l" hint-placeholder-count="3">
          <button onClick="{{ l.onClick }}" style="{{ l.style }}">{{ l.code }}</button>
        </sc-for>
      </div>
      <a href="Contact.dc.html" style="display:inline-flex;align-items:center;gap:8px;background:#1A2D47;color:#F7F4EE;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:0.04em;padding:12px 22px;border:1px solid #1A2D47;transition:background .2s;" style-hover="background:#B08D57;border-color:#B08D57;">
        {{ ctaLabel }}
      </a>
    </div>
  </div>
</header>
<div style="height:82px;"></div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:82},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;accueil&quot;,&quot;apropos&quot;,&quot;domaines&quot;,&quot;affaires&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;accueil&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
const T = {
  FR: { role: "Avocat · Barreau de Tunis", cta: "Prendre rendez-vous",
        nav: ["Accueil", "À propos", "Domaines d'intervention", "Affaires marquantes", "Contact"] },
  EN: { role: "At the Tunis Bar Association", cta: "Book a Consultation",
        nav: ["Home", "About", "Practice Areas", "Notable Matters", "Contact"] },
};
const NAME = { FR: "Maître Montassar Bouzrara", EN: "Attorney Montassar Bouzrara" };
class Component extends DCLogic {
  state = { lang: (typeof localStorage !== "undefined" && localStorage.getItem("site_lang")) || "EN" };
  componentDidMount() {
    this._onLang = (e) => this.setState({ lang: e.detail }, () => this.applyDir());
    window.addEventListener("site-langchange", this._onLang);
    this.applyDir();
  }
  componentWillUnmount() { window.removeEventListener("site-langchange", this._onLang); }
  applyDir() {
    document.documentElement.setAttribute("dir", "ltr");
    document.documentElement.setAttribute("lang", this.state.lang.toLowerCase());
  }
  setLang(code) {
    try { localStorage.setItem("site_lang", code); } catch (e) {}
    window.dispatchEvent(new CustomEvent("site-langchange", { detail: code }));
  }
  renderVals() {
    const lang = this.state.lang;
    const t = T[lang] || T.EN;
    const active = this.props.active || "";
    const keys = ["accueil", "apropos", "domaines", "affaires", "contact"];
    const hrefs = ["index.html", "APropos.dc.html", "Domaines.dc.html", "Affaires.dc.html", "Contact.dc.html"];
    const navItems = t.nav.map((label, i) => {
      const on = keys[i] === active;
      return { label, href: hrefs[i],
        style: `text-decoration:none;font-size:14px;font-weight:${on?600:400};letter-spacing:0.01em;color:${on?'#1A2D47':'#4A5568'};padding-bottom:4px;border-bottom:2px solid ${on?'#B08D57':'transparent'};transition:color .2s;white-space:nowrap;` };
    });
    const langs = ["FR", "EN"].map(code => {
      const on = code === lang;
      return { code, onClick: () => this.setLang(code),
        style: `background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:0.06em;padding:4px 7px;color:${on?'#1A2D47':'#9AA3B0'};border-bottom:1.5px solid ${on?'#B08D57':'transparent'};` };
    });
    return { navItems, langs, nameMark: NAME[lang] || NAME.EN, roleMark: t.role, ctaLabel: t.cta };
  }
}
</script>
</body>
</html>
